# SC-005 reproducibility acid test — PROOF ENVIRONMENT, not a deployment target.
# Run:  docker compose -f specs/001-reproducible-install/validation/docker-compose.yml run --rm validate
# (or run the same script on the host: bash specs/001-reproducible-install/validation/run-validation.sh)

services:
  validate:
    build:
      context: ../../../          # repo root: hypostasis/ + mneme/ + pyproject.toml live here
      dockerfile: specs/001-reproducible-install/validation/Dockerfile
    # The acid test is self-contained (a sample authority, no real components/substrate),
    # so it needs no network and no DGX. It exits non-zero on any FAIL (Principle I).
