# mneme recipe v2 (GH #24). Promotes the 6-wing "standard" model — proven in production
# (toee) — to the recommended scaffold the whole fleet converges on. v1 (three_wing) is
# preserved for campaigns that adopted it; conformance compares each campaign's adopted version.
# Two layers: `mechanical` is ENFORCED (a deviation is non-conformance unless dispositioned
# `deliberate`); `scaffold` is RECOMMENDED and overridable. Prose: MEMPALACE_HOWTO.md.
#
# Change vs v1: notes/ and summaries/ are WINGS now (not baseline exclusions); the standard
# adds the `prep` (notes/sessions) and `summaries` wings and a `party` room on <campaign>.
# Trust is descriptive except `authoritative`, which alone selects canon_wing in the search face.
version: "2.0.0"

mechanical:
  baseline_exclusions:
    - logs/
    - voice/
    - examples/
    - .claude/
    - MEMPALACE.md
    - "*.sh"
    - config.yaml
    - ui_config.yaml
    - entities.json
  mining_order: subscopes_before_root
  tunnel_rooms: [npcs, world]
  hazards:
    - "init_overwrites_root_yaml: mempalace init regenerates the root mempalace.yaml; the derived file is regenerated by mneme anyway."

scaffold:
  # The standard 6-wing model — preferred when its source dirs exist. Wings are listed
  # sub-scopes-before-root (notes/sessions before notes; root '.' last) per FR-004.
  - id: standard
    wings:
      - name: narrative
        trust: authoritative
        source_hint: docs/chapters
        rooms_hint: [chapters, general]
      - name: chronicle
        trust: accelerator
        source_hint: docs/distill_extractions
        rooms_hint: [npcs, world, arcs, general]
      - name: prep
        trust: reference
        source_hint: notes/sessions
        rooms_hint: [prep, general]
      - name: notes
        trust: reference
        source_hint: notes
        rooms_hint: [prep, handouts, design, references, general]
      - name: summaries
        trust: reference
        source_hint: summaries
        rooms_hint: [narration, extractions, summary, general]
      - name: "<campaign>"
        trust: reference
        source_hint: .
        rooms_hint: [npcs, party, world, arcs, general]
  # Fallbacks for campaigns missing the richer dirs.
  - id: three_wing
    wings:
      - name: narrative
        trust: authoritative
        source_hint: docs/chapters
        rooms_hint: [chapters, general]
      - name: chronicle
        trust: accelerator
        source_hint: docs/distill_extractions
        rooms_hint: [npcs, world, arcs, general]
      - name: "<campaign>"
        trust: reference
        source_hint: .
        rooms_hint: [npcs, party, world, arcs, mechanics, dead, general]
  - id: two_wing
    wings:
      - name: narrative
        trust: authoritative
        source_hint: docs/chapters
        rooms_hint: [chapters, general]
      - name: "<campaign>"
        trust: reference
        source_hint: .
        rooms_hint: [npcs, party, world, general]
  - id: single_wing
    wings:
      - name: "<campaign>"
        trust: reference
        source_hint: .
        rooms_hint: [general]
