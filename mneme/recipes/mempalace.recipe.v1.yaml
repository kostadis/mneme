# The mneme-owned mempalace recipe (FR-007/015). The shared best practice, versioned.
# Two layers: `mechanical` is ENFORCED (a deviation is non-conformance unless
# dispositioned `deliberate`); `scaffold` is RECOMMENDED and overridable.
# Prose rationale: MEMPALACE_HOWTO.md (served as management instructions, FR-028).
version: "1.0.0"

mechanical:
  baseline_exclusions:
    - summaries/
    - logs/
    - voice/
    - examples/
    - notes/
    - .claude/
    - MEMPALACE.md
    - "*.sh"
    - config.yaml
    - ui_config.yaml
    - entities.json
  mining_order: subscopes_before_root
  tunnel_rooms: [npcs, world]
  hazards:
    - "init_overwrites_root_yaml: mempalace init regenerates the root mempalace.yaml; the derived file is regenerated by mneme anyway."

scaffold:
  - id: three_wing
    wings:
      - name: narrative
        trust: authoritative
        source_hint: docs/chapters
        rooms_hint: [chapters, general]
      - name: chronicle
        trust: accelerator
        source_hint: docs/distill_extractions
        rooms_hint: [npcs, world, arcs, general]
      - name: "<campaign>"
        trust: reference
        source_hint: .
        rooms_hint: [npcs, world, arcs, mechanics, dead, general]
  - id: two_wing
    wings:
      - name: narrative
        trust: authoritative
        source_hint: docs/chapters
        rooms_hint: [chapters, general]
      - name: "<campaign>"
        trust: reference
        source_hint: .
        rooms_hint: [npcs, world, general]
  - id: single_wing
    wings:
      - name: "<campaign>"
        trust: reference
        source_hint: .
        rooms_hint: [general]
